name: Release

# Cut a release one of two ways:
#   - push a version tag:  git tag v0.30.0 && git push origin v0.30.0
#   - or run this workflow manually (Actions tab / dispatch) with a tag input
# Either way it cross-compiles the single Mu binary for linux/macOS
# (amd64+arm64) and attaches them to the GitHub release as mu-<os>-<arch> —
# the exact names install.sh downloads on machines without Go.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Version tag to cut (e.g. v0.30.0)'
        required: true

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Resolve tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build binaries
        run: |
          mkdir -p dist
          for target in linux/amd64 linux/arm64 darwin/amd64 darwin/arm64; do
            os="${target%/*}"; arch="${target#*/}"
            out="dist/mu-${os}-${arch}"
            echo "Building ${out}"
            CGO_ENABLED=0 GOOS="${os}" GOARCH="${arch}" \
              go build -trimpath -ldflags "-s -w" -o "${out}" .
          done
          ls -lh dist

      - name: Publish release with binaries
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.tag.outputs.tag }}
        run: |
          # Creates the tag (at this commit) and release if missing; on a
          # re-run, just overwrites the attached binaries.
          gh release create "${TAG}" dist/* \
            --target "${GITHUB_SHA}" \
            --title "${TAG}" \
            --generate-notes \
          || gh release upload "${TAG}" dist/* --clobber
