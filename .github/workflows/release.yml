name: Release

# Cut a release by pushing a version tag, e.g.:
#   git tag v0.1.0 && git push origin v0.1.0
# This cross-compiles the single Mu binary for linux/macOS (amd64+arm64) and
# attaches them to the GitHub release as mu-<os>-<arch> — the exact names
# install.sh downloads on machines without Go.

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Build binaries
        run: |
          mkdir -p dist
          for target in linux/amd64 linux/arm64 darwin/amd64 darwin/arm64; do
            os="${target%/*}"; arch="${target#*/}"
            out="dist/mu-${os}-${arch}"
            echo "Building ${out}"
            CGO_ENABLED=0 GOOS="${os}" GOARCH="${arch}" \
              go build -trimpath -ldflags "-s -w" -o "${out}" .
          done
          ls -lh dist

      - name: Publish release with binaries
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Create the release if it doesn't exist yet; otherwise (re-run)
          # overwrite the attached binaries.
          gh release create "${GITHUB_REF_NAME}" dist/* \
            --title "${GITHUB_REF_NAME}" \
            --generate-notes \
          || gh release upload "${GITHUB_REF_NAME}" dist/* --clobber
