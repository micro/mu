name: Product Review

# The PRODUCT lens of Mu's autonomous loop — the analog of go-micro's architect,
# but for the product (see internal/docs/CONTINUOUS_IMPROVEMENT.md). Where the
# increment loop ships code and the marketing pass tells the story, the product
# agent decides WHERE TO NEXT: it exercises the live product, judges what is
# rough or incoherent against the North Star, and keeps the ranked queue in
# internal/docs/PRIORITIES.md live. Its output is priorities + an assessment, not
# large refactors.
#
# Bias of this phase is product-market fit through REFINEMENT, not surface area:
# make what we already have work seamlessly. See internal/docs/THESIS.md.
#
# Runs hourly, offset before the :29 increment run, so it re-prioritises and THEN
# the loop builds the new top of the queue. Opens a fresh issue and dispatches
# Codex via CODEX_TRIGGER_TOKEN (Codex ignores Actions-bot comments).

on:
  workflow_dispatch: {}
  schedule:
    - cron: "59 * * * *" # hourly at :59, just before the :29 increment run

permissions:
  issues: write

concurrency:
  group: product-review
  cancel-in-progress: false

jobs:
  dispatch:
    runs-on: ubuntu-latest
    steps:
      - name: Open a product review issue and dispatch Codex
        env:
          GH_TOKEN: ${{ secrets.CODEX_TRIGGER_TOKEN || github.token }}
          HAS_TRIGGER_TOKEN: ${{ secrets.CODEX_TRIGGER_TOKEN != '' }}
          REPO: ${{ github.repository }}
          RUN_NUMBER: ${{ github.run_number }}
        run: |
          if [ "$HAS_TRIGGER_TOKEN" != "true" ]; then
            echo "CODEX_TRIGGER_TOKEN is not set — skipping (Codex ignores Actions-bot comments)."
            exit 0
          fi
          # Ensure the label the loop uses exists (idempotent).
          gh label create codex --repo "$REPO" --color 5319e7 --description "Autonomous loop (Codex)" 2>/dev/null || true
          ISSUE_URL=$(gh issue create --repo "$REPO" \
            --title "Product review #$RUN_NUMBER" \
            --body "Continuous product oversight against the North Star in internal/docs/THESIS.md. Output: a re-ranked internal/docs/PRIORITIES.md (only if it changed) plus an assessment.")
          ISSUE_NUM="${ISSUE_URL##*/}"
          echo "Opened issue #$ISSUE_NUM — dispatching Codex (Product)."
          gh issue comment "$ISSUE_NUM" --repo "$REPO" --body \
          "@codex Act as the head of product for Mu — the everyday agent. Read CLAUDE.md and internal/docs/THESIS.md (the North Star) first, and re-derive alignment from the canon it names (README.md, docs/VISION.md, docs/PRINCIPLES.md, and the LIVE product at micro.mu — actually exercise the ask → answer loop). The bias of this phase is product-market fit through REFINEMENT, not new surface area: make what already exists work seamlessly. Each run: (1) ASSESS — go through the core loop as a real person would (guest and signed-in, web and chat clients where observable): does asking Mu something return a correct, well-formatted, fast answer? Do the home cards and agent-callable services work end to end and degrade gracefully when a provider is down? Is the first-run experience clear without an account? (2) TRACK STATE — scan recently merged PRs and open codex PRs/issues so the queue reflects reality (drop done items, don't re-queue in-flight work). (3) MAINTAIN THE QUEUE in internal/docs/PRIORITIES.md — a SINGLE ordered list, highest-value first, each item linking a scoped, CI-verifiable issue (#N); roadmap phase (Now → Next → Later in THESIS.md) is the primary ordering, with rough edges and bugs interleaved by value, refinement ranked above additions. For any prioritized gap with no issue yet, file one: \`gh issue create --label codex --title \"<scoped task>\" --body \"<goal, scope, acceptance criteria>\"\`. OUTPUT: post a concise assessment as a comment on this issue (#$ISSUE_NUM) — what works, what is rough, the top friction in the core loop, and the reasoning behind the ranking. If the ranking actually changed, open ONE PR for PRIORITIES.md: \`git switch -c codex/product-$ISSUE_NUM\`, \`git push -u origin codex/product-$ISSUE_NUM\`, \`gh pr create --base main --label codex --title \"<title>\" --body \"<summary, Closes #$ISSUE_NUM>\"\`, then \`gh pr merge --squash --auto --delete-branch\`. If the queue is already accurate, do NOT open a PR — just close this issue (\`gh issue close $ISSUE_NUM\`). Do NOT make breaking public-contract changes (MCP/A2A/REST/webhooks/env vars), pricing changes, brand/positioning rewrites, or large refactors yourself — surface those in the assessment for the human. Do not use the make_pr tool (it is a no-op stub)."
