name: Continuous Improvement

# Autonomous improvement loop for Mu.
#
# On a schedule, opens a fresh tracking issue and dispatches Codex to
# implement one improvement increment. Codex runs the change, verifies
# it builds and passes tests, opens a PR, and enables auto-merge so it
# lands when CI is green.
#
# Each run opens a FRESH issue so Codex gets a unique branch name
# (codex/increment-<issue-num>) and a clean PR. The dispatch asks
# Codex to "Closes #<issue>" so tracking issues auto-close on merge.
#
# Gated on CODEX_TRIGGER_TOKEN — Codex ignores comments from the
# github-actions bot, so a PAT for a user account Codex follows is
# required. Without the secret the workflow no-ops cleanly.

on:
  workflow_dispatch: {}
  schedule:
    - cron: "29 * * * *" # hourly, off-minute

permissions:
  issues: write

concurrency:
  group: continuous-improvement
  cancel-in-progress: false

jobs:
  dispatch:
    runs-on: ubuntu-latest
    steps:
      - name: Open a fresh increment issue and dispatch Codex
        env:
          GH_TOKEN: ${{ secrets.CODEX_TRIGGER_TOKEN || github.token }}
          HAS_TRIGGER_TOKEN: ${{ secrets.CODEX_TRIGGER_TOKEN != '' }}
          REPO: ${{ github.repository }}
          RUN_NUMBER: ${{ github.run_number }}
        run: |
          if [ "$HAS_TRIGGER_TOKEN" != "true" ]; then
            echo "CODEX_TRIGGER_TOKEN is not set — skipping dispatch."
            echo "Add a CODEX_TRIGGER_TOKEN secret (a PAT for a user account"
            echo "Codex follows) to activate the loop."
            exit 0
          fi
          # Ensure the label the loop uses exists (idempotent).
          gh label create codex --repo "$REPO" --color 5319e7 --description "Autonomous loop (Codex)" 2>/dev/null || true

          ISSUE_URL=$(gh issue create --repo "$REPO" \
            --title "Continuous improvement increment #$RUN_NUMBER" \
            --body "Autonomous continuous-improvement increment. North Star: internal/docs/THESIS.md; queue: internal/docs/PRIORITIES.md; charter: internal/docs/CONTINUOUS_IMPROVEMENT.md.")

          ISSUE_NUM="${ISSUE_URL##*/}"
          echo "Opened issue #$ISSUE_NUM — dispatching Codex."

          gh issue comment "$ISSUE_NUM" --repo "$REPO" --body \
          "@codex Run one continuous-improvement increment per internal/docs/CONTINUOUS_IMPROVEMENT.md, aligned to the North Star in internal/docs/THESIS.md (an agent for everyday; this phase favours seamlessness/refinement over new surface area). Read CLAUDE.md for project context. PICK THE WORK FROM THE QUEUE: read internal/docs/PRIORITIES.md and take the highest-ranked item whose linked issue is still OPEN — that is your task, and its issue number is the one you close with 'Closes #<that-issue>'. (If PRIORITIES.md is missing or every listed item's issue is already closed, fall back to the single highest-value item from the charter's category order: bug fixes > test coverage > code quality > feature improvements > infrastructure.) Implement it and verify \`go build ./...\`, \`go test ./... -short\`, and \`go vet ./...\` all pass. Then open the PR YOURSELF from the shell — do NOT use the make_pr tool (it only records metadata and never creates a PR). Create a uniquely-named branch: \`git switch -c codex/increment-$ISSUE_NUM\`, then \`git push -u origin codex/increment-$ISSUE_NUM\`, then \`gh pr create --base main --label codex --title \"<title>\" --body \"<body; include 'Closes #<the priority issue you built>' so it leaves the queue, and 'Closes #$ISSUE_NUM' for this run's tracker>\"\`. Finally enable auto-merge: \`gh pr merge --squash --auto --delete-branch\`. The gh CLI is installed and authenticated. One concern per PR; stay out of brand/positioning copy and breaking public contracts (MCP/A2A/REST/webhooks/env vars)."
